<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>京东 SKU 查询 · 真实数据演示</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
<style>
/* ---------- 全局重置 & 字体 ---------- */
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
  background:#f5f7fa;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 16px;
  color:#1e2a3a;
}
.container{
  max-width:780px;
  width:100%;
  background:#fff;
  border-radius:28px;
  box-shadow:0 12px 30px rgba(0,0,0,.06);
  padding:28px 24px 36px;
  transition:all .2s ease;
}
/* ---------- 头部 ---------- */
.header{
  display:flex;align-items:center;gap:6px;margin-bottom:24px;flex-wrap:wrap
}
.header h1{
  font-size:24px;font-weight:600;color:#0a1628
}
.header .badge{
  background:linear-gradient(145deg,#e63b3b,#c62828);
  color:#fff;font-size:12px;font-weight:500;
  padding:2px 12px;border-radius:30px;
  box-shadow:0 2px 6px rgba(228,57,60,.2)
}
.sub{
  color:#6b7a8f;font-size:14px;
  background:#f0f2f5;padding:4px 14px;
  border-radius:30px
}
/* ---------- 搜索区 ---------- */
.search-area{
  display:flex;flex-wrap:wrap;gap:10px;margin-bottom:28px;align-items:center
}
.search-input-wrapper{
  flex:1;min-width:200px;position:relative
}
.search-input-wrapper input{
  width:100%;padding:14px 18px;
  border:1.5px solid #e4e8ee;border-radius:60px;
  font-size:16px;background:#fafbfc;
  transition:all .2s;outline:none;
  color:#1e2a3a;font-weight:450
}
.search-input-wrapper input:focus{
  border-color:#e4393c;background:#fff;
  box-shadow:0 0 0 4px rgba(228,57,60,.08)
}
.search-input-wrapper input::placeholder{
  color:#9aa6b5;font-weight:400
}
.search-btn{
  background:#e4393c;border:none;color:#fff;
  font-weight:600;font-size:16px;
  padding:14px 32px;border-radius:60px;
  cursor:pointer;transition:.15s;
  letter-spacing:.5px;box-shadow:0 4px 10px rgba(228,57,60,.25);
  display:inline-flex;align-items:center;justify-content:center;gap:6px
}
.search-btn:hover{
  background:#d32f2f;transform:scale(1.02);
  box-shadow:0 6px 14px rgba(228,57,60,.3)
}
.search-btn:active{transform:scale(.97)}
/* ---------- 产品卡片 ---------- */
.product-card{
  margin-top:8px;border-radius:24px;
  background:#fff;border:1px solid #edf0f5;
  padding:20px 20px 24px;transition:all .2s;
  box-shadow:0 4px 12px rgba(0,0,0,.02);
}
.product-main{
  display:flex;flex-wrap:wrap;gap:24px
}
.image-section{
  flex:0 0 200px;max-width:200px;width:100%;
  background:#fafbfc;border-radius:20px;
  overflow:hidden;border:1px solid #f0f2f6;
  display:flex;align-items:center;justify-content:center;
  aspect-ratio:1/1;position:relative
}
.image-section img{
  width:100%;height:100%;object-fit:cover;
  display:block;background:#f3f5f9
}
.image-placeholder{
  width:100%;height:100%;display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  background:#f3f5f9;color:#8f9eb2;font-size:14px;font-weight:450
}
.image-placeholder svg{opacity:.4}
.info-section{
  flex:1;min-width:240px;display:flex;
  flex-direction:column;gap:12px
}
.product-title{
  font-size:18px;font-weight:600;line-height:1.45;
  color:#0a1628;display:-webkit-box;
  -webkit-line-clamp:3;-webkit-box-orient:vertical;
  overflow:hidden;text-overflow:ellipsis;
  max-height:4.5em
}
.sku-row{
  display:flex;flex-wrap:wrap;align-items:center;gap:10px 18px;
  background:#f7f9fc;padding:8px 14px;
  border-radius:40px;font-size:14px;color:#2d3f58;margin-top:4px
}
.sku-label{font-weight:450;color:#6b7a8f}
.sku-value{font-weight:550;letter-spacing:.3px;color:#1e2a3a}
.price-stock-row{
  display:flex;flex-wrap:wrap;align-items:center;
  gap:16px 24px;margin-top:4px
}
.price-box{
  display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 16px
}
.price-item{
  display:flex;align-items:baseline;gap:4px
}
.price-label{font-size:13px;color:#6b7a8f}
.price-number{
  font-weight:650;font-size:20px;color:#e4393c
}
.price-number small{font-size:14px;font-weight:500}
.price-original{
  color:#9aa6b5;text-decoration:line-through;font-size:16px;font-weight:400
}
.tag-group{
  display:flex;flex-wrap:wrap;align-items:center;gap:8px 12px;margin-top:2px
}
.tag{
  background:#fceaea;color:#c62828;font-size:12px;
  font-weight:500;padding:4px 12px;border-radius:30px;
  border:0.5px solid rgba(228,57,60,.15)
}
.tag-promo{
  background:#e8f0fe;color:#1a5c9e;border-color:#c6dafc
}
.tag-presale{
  background:#fff3e0;color:#b7651a;border-color:#fadcb5
}
.stock-status{
  display:inline-flex;align-items:center;gap:6px;
  font-size:14px;font-weight:500;
  padding:4px 14px 4px 10px;border-radius:40px
}
.stock-status.in{background:#eaf7e7;color:#2a7a3b}
.stock-status.out{background:#ffe9e9;color:#b33a3a}
.stock-status.presale{background:#fff1d6;color:#a45f1a}
.stock-indicator{
  width:8px;height:8px;border-radius:50%;background:#2e9c4a;display:inline-block
}
.stock-status.out .stock-indicator{background:#c94a4a}
.stock-status.presale .stock-indicator{background:#d98c2a}
.promo-line{
  background:#fafbfe;padding:10px 14px;
  border-radius:16px;font-size:14px;color:#1e2a3a;
  border-left:4px solid #e4393c;margin-top:6px;
  display:flex;flex-wrap:wrap;align-items:center;gap:6px 14px
}
.promo-line strong{font-weight:600;color:#c62828}
.promo-line .extra{color:#6b7a8f;font-size:13px}
/* ---------- 额外信息区 ---------- */
.extra-section{
  margin-top:16px;border-top:1px solid #edf0f5;padding-top:12px
}
.extra-section h3{
  font-size:16px;font-weight:600;color:#0a1628;margin-bottom:6px
}
.features{
  display:flex;flex-wrap:wrap;gap:12px;margin-bottom:8px
}
.feature{
  display:flex;align-items:center;gap:4px;font-size:13px;color:#555
}
.feature svg{
  width:16px;height:16px;fill:#e4393c
}
.description{
  font-size:14px;line-height:1.6;color:#333;margin-top:6px
}
.footer-note{
  margin-top:30px;font-size:13px;color:#9aa6b5;
  text-align:center;border-top:1px solid #edf0f5;padding-top:20px
}
/* ---------- 空状态 & 响应式 ---------- */
.empty-state{
  text-align:center;padding:40px 10px 30px;color:#8f9eb2
}
.empty-state svg{opacity:.3;margin-bottom:10px}
.empty-state p{font-size:15px}
.empty-state{display:none}
@media (max-width:600px){
  .container{padding:20px 16px}
  .product-main{flex-direction:column;align-items:center}
  .image-section{flex:0 0 160px;max-width:160px}
  .search-btn{width:100%;justify-content:center}
  .header h1{font-size:20px}
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>SKU 查询</h1>
    <span class="badge">京东数据</span>
    <span class="sub">真实接口演示</span>
  </div>

  <!-- 搜索框 -->
  <div class="search-area">
    <div class="search-input-wrapper">
      <input type="text" id="skuInput" placeholder="输入京东商品 SKU，如 100012345" autofocus>
    </div>
    <button class="search-btn" id="searchBtn">查询</button>
  </div>

  <!-- 产品展示区 -->
  <div id="productDisplay">
    <!-- 空状态 -->
    <div class="empty-state" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none"
           stroke="#b0c0d0" stroke-width="1.2">
        <rect x="3" y="4" width="18" height="16" rx="2"/>
      </svg>
      <p>输入 SKU 后点击查询，商品信息将在这里显示</p>
    </div>

    <!-- 主卡片（默认隐藏） -->
    <div id="productCard" class="product-card" style="display:none;">
      <div class="product-main">

        <div class="image-section">
          <img id="productImage" src="" alt="商品主图" style="display:none;">
          <div class="image-placeholder" id="imagePlaceholder">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#a0b0c4" stroke-width="1.2">
              <rect x="3" y="4" width="18" height="16" rx="2"/>
            </svg>
            <span>暂无图片</span>
          </div>
        </div>

        <!-- 信息区 -->
        <div class="info-section">
          <div class="product-title" id="productTitle">加载中…</div>

          <div class="sku-row">
            <span class="sku-label">SKU</span>
            <span class="sku-value" id="skuDisplay">—</span>
          </div>

          <div class="price-stock-row">
            <div class="price-box">
              <div class="price-item">
                <span class="price-label">到手价</span>
                <span class="price-number" id="finalPriceNum">—</span>
              </div>
              <div class="price-item">
                <span class="price-label">日常售价</span>
                <span class="price-original" id="priceOriginal">—</span>
              </div>
            </div>

            <div class="stock-status" id="stockStatus">
              <span class="stock-indicator"></span>
              <span id="stockText">—</span>
            </div>
          </div>

          <!-- 活动标签 -->
          <div class="tag-group" id="tagGroup"></div>

          <!-- 优惠文字 -->
          <div class="promo-line" id="promoLine"></div>

          <!-- 参数 / 描述 -->
          <div class="extra-section">
            <h3>商品参数</h3>
            <div class="features">
              <div class="feature"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zm0 11L2 17l10 5 10-5-10-5z"/></svg>品牌</div>
              <div class="feature"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zm0 11L2 17l10 5 10-5-10-5z"/></svg>型号</div>
              <div class="feature"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zm0 11L2 17l10 5 10-5-10-5z"/></svg>重量</div>
            </div>
            <div class="description" id="productDesc">点击查询后将显示商品描述。</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="footer-note">
    查询效果基于真实 API · 价格/库存为实时数据
  </div>
</div>
